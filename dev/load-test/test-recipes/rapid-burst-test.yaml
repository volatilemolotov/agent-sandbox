# The number of namespaces to create and spread the test load across.
{{$namespaces := DefaultParam .CL2_NAMESPACES 1}}
# The maximum rate (Queries Per Second) for cluster loader to create objects during test phases.
{{$qps := DefaultParam .CL2_QPS 100}}
# The target number of pre-warmed, ready sandboxes to maintain in the warm pool.
{{$warmpool_size := DefaultParam .CL2_WARMPOOL_SIZE 200}}
# The prefix used for naming the test namespaces (e.g., "agent-sandbox-1").
{{$namespacePrefix := DefaultParam .CL2_NAMESPACE_PREFIX "agent-sandbox"}}
# The number of new SandboxClaims to create during each burst iteration.
{{$burstSize := DefaultParam .CL2_BURST_SIZE 50}}
# The total number of burst iterations to execute in the test.
{{$totalBursts := DefaultParam .CL2_TOTAL_BURSTS 100}}
{{$runtimeClass := DefaultParam .CL2_RUNTIME_CLASS "gvisor"}}
# Whether to enable HPA warmpool scaling during the test.
{{$enableHpa := DefaultParam .CL2_ENABLE_HPA "false"}}
# The minimum replicas for the HPA controlling the warm pool.
{{$hpaMinReplicas := DefaultParam .CL2_HPA_MIN_REPLICAS 1000}}
# The maximum replicas for the HPA controlling the warm pool.
{{$hpaMaxReplicas := DefaultParam .CL2_HPA_MAX_REPLICAS 2000}}
# The target claim creation rate (per second) for the HPA.
{{$hpaTargetValue := DefaultParam .CL2_HPA_TARGET_VALUE "0.5"}}
# The metric name queried by the HPA to perform scaling.
{{$hpaMetricName := DefaultParam .CL2_HPA_METRIC_NAME "prometheus.googleapis.com|agent_sandbox_claim_creation_total|counter"}}
# Whether to enable CapacityBuffer scaling during the test.
{{$enableCapacityBuffer := DefaultParam .CL2_ENABLE_CAPACITY_BUFFER "false"}}
# The buffer percentage for CapacityBuffer.
{{$bufferPercentage := DefaultParam .CL2_BUFFER_PERCENTAGE 200}}
# The provisioning strategy for CapacityBuffer.
{{$provisioningStrategy := DefaultParam .CL2_PROVISIONING_STRATEGY "buffer.gke.io/standby-capacity"}}
# The pause duration to wait for standby capacity nodes to provision.
{{$capacityBufferPause := DefaultParam .CL2_CAPACITY_BUFFER_PAUSE "5m"}}

name: rapid-burst-test

namespace:
  number: {{$namespaces}}
  prefix: {{$namespacePrefix}}

tuningSets:
- name: BurstCreate
  qpsLoad:
    qps: {{$qps}}

steps:
- name: Start Startup Latency Measurement
  measurements:
  - Identifier: SandboxStartupLatency
    Method: PodStartupLatency
    Params:
      action: start
      labelSelector: "app=agent-sandbox-load-test"
  - Identifier: SandboxClaimStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: start
      metricName: Agent Sandbox Claim Startup Latency (ms)
      metricVersion: v1
      unit: ms
      queries:
        - name: StartupLatency50
          query: histogram_quantile(0.50, sum(rate(agent_sandbox_claim_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000  # Equivalent to 1s
          requireSamples: true
        - name: StartupLatency90
          query: histogram_quantile(0.90, sum(rate(agent_sandbox_claim_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000  # Equivalent to 1s
          requireSamples: true
        - name: StartupLatency99
          query: histogram_quantile(0.99, sum(rate(agent_sandbox_claim_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 5000  # Equivalent to 5s
          requireSamples: true
  - Identifier: SandboxClaimControllerStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: start
      metricName: Agent Sandbox Claim Controller Startup Latency (ms)
      metricVersion: v1
      unit: ms
      queries:
        - name: ControllerStartupLatency50
          query: histogram_quantile(0.50, sum(rate(agent_sandbox_claim_controller_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000
          requireSamples: true
        - name: ControllerStartupLatency90
          query: histogram_quantile(0.90, sum(rate(agent_sandbox_claim_controller_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000
          requireSamples: true
        - name: ControllerStartupLatency99
          query: histogram_quantile(0.99, sum(rate(agent_sandbox_claim_controller_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 5000
          requireSamples: true

- name: Setup Sandbox Template
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 1
    tuningSet: BurstCreate
    objectBundle:
    - basename: template
      objectTemplatePath: templates/cluster-loader-sandbox-template.yaml
      templateFillMap:
        LatencyType: rapid-burst
        RuntimeClass: {{$runtimeClass}}

- name: Setup Sandbox Warm Pool
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 1
    tuningSet: BurstCreate
    objectBundle:
    - basename: warmpool
      objectTemplatePath: templates/cluster-loader-warmpool.yaml
      templateFillMap:
        TemplateName: template-0
        Replicas: {{$warmpool_size}}

- name: Wait for Warm Pool Sandboxes to be Ready
  measurements:
  - Identifier: WaitForWarmPoolSandboxes
    Method: WaitForGenericK8sObjects
    Params:
      action: start
      objectGroup: "agents.x-k8s.io"
      objectVersion: "v1beta1"
      objectResource: "sandboxes"
      labelSelector: "agents.x-k8s.io/warm-pool-sandbox"
      namespaceRange: {min: 1, max: {{$namespaces}}}
      successfulConditions: ["Ready=True"]
      failedConditions: []
      minDesiredObjectCount: {{MultiplyInt $warmpool_size $namespaces}}
      maxFailedObjectCount: 0
      timeout: 15m

{{if eq $enableHpa "true"}}
- name: Setup Sandbox Warm Pool HPA
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 1
    tuningSet: BurstCreate
    objectBundle:
    - basename: warmpool-hpa
      objectTemplatePath: templates/cluster-loader-hpa.yaml
      templateFillMap:
        WarmPoolName: warmpool-0
        MinReplicas: {{$hpaMinReplicas}}
        MaxReplicas: {{$hpaMaxReplicas}}
        TargetValue: {{$hpaTargetValue}}
        MetricName: {{$hpaMetricName}}
{{end}}

{{if eq $enableCapacityBuffer "true"}}
- name: Setup Capacity Buffer
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 1
    tuningSet: BurstCreate
    objectBundle:
    - basename: capacity-buffer
      objectTemplatePath: templates/cluster-loader-capacity-buffer.yaml
      templateFillMap:
        WarmPoolName: warmpool-0
        Percentage: {{$bufferPercentage}}
        ProvisioningStrategy: {{$provisioningStrategy}}

- name: Pause {{$capacityBufferPause}} for Capacity Buffer Nodes to Provision
  measurements:
  - Identifier: WaitCapacityBufferProvision
    Method: Sleep
    Params:
      duration: {{$capacityBufferPause}}
{{end}}

# --- START BURST LOOP ---
{{range $i := Loop $totalBursts}}
{{$burstIteration := AddInt $i 1}}
{{$replicaCount := MultiplyInt $burstIteration $burstSize}}

- name: Create Burst {{$burstIteration}} Sandbox Claims ({{$burstSize}})
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: {{$replicaCount}}
    tuningSet: BurstCreate
    objectBundle:
    - basename: agent-claim
      objectTemplatePath: templates/cluster-loader-sandbox-claim.yaml
      templateFillMap:
        WarmPoolName: warmpool-0

- name: Wait for Burst {{$burstIteration}} Sandbox Claims to be Ready
  measurements:
  - Identifier: WaitForBurst{{$burstIteration}}SandboxClaims
    Method: WaitForGenericK8sObjects
    Params:
      action: start
      objectGroup: extensions.agents.x-k8s.io
      objectVersion: v1beta1
      objectResource: sandboxclaims
      namespaceRange: {min: 1, max: {{$namespaces}}}
      successfulConditions: ["Ready=True"]
      failedConditions: []
      minDesiredObjectCount: {{MultiplyInt $replicaCount $namespaces}}
      maxFailedObjectCount: 0
      timeout: 60m
      refreshInterval: 20ms

- name: Pause 20 Seconds After Burst {{$burstIteration}}
  measurements:
  - Identifier: WaitAfterBurst{{$burstIteration}}
    Method: Sleep
    Params:
      duration: 20s
{{end}}
# --- END BURST LOOP ---

- name: Pause 1m to allow Prometheus to scrape the metrics
  measurements:
  - Identifier: WaitAfterTest
    Method: Sleep
    Params:
      duration: 1m

- name: Gather Results
  measurements:
  - Identifier: SandboxStartupLatency
    Method: PodStartupLatency
    Params:
      action: gather
      labelSelector: "app=agent-sandbox-load-test"
  - Identifier: SandboxClaimStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: gather
      enableViolations: true
  - Identifier: SandboxClaimControllerStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: gather
      enableViolations: true

- name: Delete Sandbox Claims
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: agent-claim
      objectTemplatePath: templates/cluster-loader-sandbox-claim.yaml

{{if eq $enableHpa "true"}}
- name: Delete Sandbox Warm Pool HPA
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: warmpool-hpa
      objectTemplatePath: templates/cluster-loader-hpa.yaml
{{end}}

{{if eq $enableCapacityBuffer "true"}}
- name: Delete Capacity Buffer
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: capacity-buffer
      objectTemplatePath: templates/cluster-loader-capacity-buffer.yaml
{{end}}

- name: Delete Sandbox Warm Pool
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: warmpool
      objectTemplatePath: templates/cluster-loader-warmpool.yaml

- name: Delete Sandbox Templates
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: template
      objectTemplatePath: templates/cluster-loader-sandbox-template.yaml
