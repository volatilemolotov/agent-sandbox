apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: agent-sandbox-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: webhook-certificate
  namespace: agent-sandbox-system
spec:
  secretName: webhook-certs
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
  dnsNames:
    - webhook-service.agent-sandbox-system.svc
    - webhook-service.agent-sandbox-system.svc.cluster.local
