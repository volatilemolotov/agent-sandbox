apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: aider-browser-template
  namespace: default
spec:
  volumeClaimTemplates:
  - metadata:
      name: workspace-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
  podTemplate:
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git
        workingDir: /workspace
        env:
        # Define the repository URL you want to automatically download here
        - name: REPO_URL
          value: "https://github.com/kubernetes-sigs/agent-sandbox"
        command:
        - /bin/sh
        - -c
        - |
          # Only clone if the directory is empty to avoid crashing on restarts
          if [ -z "$(ls -A /workspace)" ]; then
            echo "Cloning $REPO_URL..."
            git clone "$REPO_URL" .
          else
            echo "/workspace is already populated. Skipping clone."
          fi
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspace

      containers:
      - name: aider
        image: aider-sandbox:v1
        imagePullPolicy: Never
        workingDir: /workspace
        ports:
        - containerPort: 8501
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: openai-api-key
              optional: true
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspace
