apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: hermes-agent
spec:
  podTemplate:
    spec:
      containers:
      - name: hermes
        image: nousresearch/hermes-agent:latest
        args: ["gateway"]
        env:
        - name: HERMES_DASHBOARD
          value: "1"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-agent-api-keys
              key: GEMINI_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-agent-api-keys
              key: OPENAI_API_KEY
        ports:
        - containerPort: 8642
          name: api
        - containerPort: 9119
          name: dashboard
        volumeMounts:
        - name: data
          mountPath: /opt/data
        - name: skill-k8s-dev
          mountPath: /opt/data/skills/custom/k8s-developer.md
          subPath: k8s-developer.md
      volumes:
      - name: skill-k8s-dev
        configMap:
          name: hermes-skills
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

