# All-in-one (core + extensions) assembly for kustomize / GitOps consumers.
#
# Unlike `sandbox.yaml` + `extensions.yaml` (which are designed for sequential
# `kubectl apply -f` and therefore both declare the agent-sandbox-controller
# Deployment), this kustomization declares the controller exactly once and turns
# on extensions via a patch -- so it has no duplicate resource ids and can be
# consumed directly by kustomize, Config Sync, Argo CD, etc.
#
# The release tooling renders this into a single collision-free `sandbox-with-extensions.yaml`
# release asset (with the ko:// image replaced by the published controller image).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # core
  - controller.yaml
  - rbac.generated.yaml
  - crds/agents.x-k8s.io_sandboxes.yaml
  # extensions (note: extensions.controller.yaml is intentionally excluded -- it
  # is a second copy of the controller Deployment; we patch the core one instead)
  - extensions.yaml
  - extensions-rbac.generated.yaml
  - crds/extensions.agents.x-k8s.io_sandboxclaims.yaml
  - crds/extensions.agents.x-k8s.io_sandboxtemplates.yaml
  - crds/extensions.agents.x-k8s.io_sandboxwarmpools.yaml

patches:
  # Enable the extensions controllers on the single controller Deployment, and
  # mount the optional agent-sandbox-config ConfigMap. This makes the patched
  # controller equivalent to extensions.controller.yaml: same args, same volumes,
  # and -- because the patch only adds to the core controller.yaml Deployment --
  # the webhook containerPort 9443 (which agent-sandbox-webhook-service targets)
  # is preserved here too. extensions.controller.yaml now declares that port as
  # well, so sandbox-with-extensions.yaml and the sequential `kubectl apply` path converge on the
  # same Deployment spec.
  #
  # Keep this patch in lockstep with extensions.controller.yaml: if its args or
  # volumes change, update them here as well (the release tool's drift guard only
  # checks that the resource file set stays in sync, not the controller's
  # container spec).
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: agent-sandbox-controller
        namespace: agent-sandbox-system
      spec:
        template:
          spec:
            containers:
              - name: agent-sandbox-controller
                args:
                  - --leader-elect=true
                  - --extensions
                volumeMounts:
                  - name: config-volume
                    mountPath: /etc/sandbox-config
                    readOnly: true
            volumes:
              - name: config-volume
                configMap:
                  name: agent-sandbox-config
                  optional: true
