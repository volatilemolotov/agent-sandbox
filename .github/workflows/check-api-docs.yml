name: Check API Documentation

on:
  pull_request:
    # Run this workflow if CRD, Go SDK, or Python SDK files change
    paths:
      - 'api/**/*.go'
      - 'extensions/api/**/*.go'
      - 'clients/go/**/*.go'
      - 'clients/python/**/*.py'
      - 'config.yaml'
      - '.github/workflows/check-api-docs.yml'

jobs:
  check-api-docs:
    name: Verify Generated API Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11' # Adjust if your SDK requires a different version
          cache: 'pip'

      - name: Generate CRD API Documentation
        run: |
          echo "Running crd-ref-docs..."
          make generate-api-docs

      - name: Generate Go SDK Documentation
        run: |
          echo "Running gomarkdoc..."
          # Generate and shift headers, outputting to the root docs folder
          make generate-go-docs

      - name: Generate Python SDK Documentation
        run: |
          echo "Running pydoc-markdown..."
          # Generate and shift headers, outputting to the root docs folder
          make generate-python-docs

      - name: Verify no uncommitted changes
        run: |
          # Stage all generated documentation files
          git add ./docs/api.md ./docs/go_sdk_reference.md ./docs/python_sdk_reference.md

          # Check if there are any differences
          if ! git diff --staged --exit-code; then
            echo "::error::API or SDK documentation is out of date!"
            echo "Please run the documentation generators locally and include the changes in your commit."
            echo "You can view the diff below:"
            git diff --staged
            exit 1
          fi
          echo "All documentation is up to date!"
