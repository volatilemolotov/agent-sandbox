name: Scheduled Release Automation

on:
  # Version tag is incremented by patch update
  schedule:
    - cron: "0 17 * * 4" # Every Thursday at 17:00 UTC
  # For Major/Minor version updates, enter tag manually
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for release (e.g., v0.2.0). Leave blank for auto-patch."
        required: false
        type: string
      poll_timeout_mins:
        description: "Maximum minutes to poll for PR merge"
        default: "360"
        required: false
        type: string

permissions:
  contents: write # Allows creating and pushing tags
  pull-requests: write
  id-token: write # Required for Google Auth

jobs:
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    environment: release
    outputs:
      run_release: ${{ steps.set-tag.outputs.run_release || steps.auto-tag.outputs.run_release }}
      new_tag: ${{ steps.set-tag.outputs.new_tag || steps.auto-tag.outputs.new_tag }}

    steps:
      - name: Checkout agent-sandbox
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          # To ensure pushing the tag during the workflow has the permission to trigger the PyPI publish workflow.
          # Github secret has repo access.
          token: ${{ secrets.GH_AUTOMATION_PAT }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Setup Git Identity
        run: |
          # Use the standard GitHub Actions Bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set Tag from Input
        if: github.event.inputs.tag != ''
        id: set-tag
        run: |
          echo "run_release=true" >> "$GITHUB_OUTPUT"
          echo "new_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Auto Tag if New Commits
        if: github.event.inputs.tag == ''
        id: auto-tag
        run: |
          ./dev/tools/auto-tag

      - name: Create and Push Git Tag
        if: steps.set-tag.outputs.run_release == 'true' || steps.auto-tag.outputs.run_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.K8S_IO_PAT }}
        run: |
          TAG="${{ steps.set-tag.outputs.new_tag || steps.auto-tag.outputs.new_tag }}"
          make release-promote TAG="$TAG" ONLY_TAGGING=true

  promote-images:
    name: Promote Images
    needs: tag-release
    if: needs.tag-release.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 180
    outputs:
      pr_url: ${{ steps.extract-pr.outputs.pr_url }}
      run_release: ${{ needs.tag-release.outputs.run_release }}
      new_tag: ${{ needs.tag-release.outputs.new_tag }}

    steps:
      - name: Checkout agent-sandbox
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_AUTOMATION_PAT }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Clone k8s.io
        env:
          # Use a Fine-Grained PAT scoped to kubernetes/k8s.io with contents:write and pull_requests:write
          GH_TOKEN: ${{ secrets.K8S_IO_PAT }}
        run: |
          cd ..
          git clone https://github.com/kubernetes/k8s.io.git
          cd k8s.io
          git remote rename origin upstream
          gh repo fork --clone=false || true # Ignore if already exists or fails to add remote if already there
          # Ensure origin remote points to the fork
          GH_USER=$(gh api user --jq .login)
          git remote add origin "https://x-access-token:${{ secrets.K8S_IO_PAT }}@github.com/$GH_USER/k8s.io.git" || git remote set-url origin "https://x-access-token:${{ secrets.K8S_IO_PAT }}@github.com/$GH_USER/k8s.io.git"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # TODO: Use workload identity instead
          # workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          # service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db #v3.0.1

      - name: Setup Git Identity
        run: |
          # Use the standard GitHub Actions Bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Promotion Script
        id: extract-pr
        env:
          # Use a Fine-Grained PAT scoped to kubernetes/k8s.io with contents:write and pull_requests:write
          GH_TOKEN: ${{ secrets.K8S_IO_PAT }}
          # Use the Fork token for Git pushing
          FORK_TOKEN: ${{ secrets.FORK_K8S_IO_PAT }}
        run: |
          # Update the git remote for the fork to use the FORK_TOKEN
          GH_USER=$(gh api user --jq .login)
          git -C ../k8s.io remote set-url origin "https://x-access-token:${FORK_TOKEN}@github.com/$GH_USER/k8s.io.git"          

          # Run promotion script skipping tag creation/push
          TAG="${{ needs.tag-release.outputs.new_tag }}"
          make release-promote TAG="$TAG" K8S_IO_DIR=../k8s.io REMOTE_UPSTREAM=upstream REMOTE_FORK=origin SKIP_TAGGING=true

          # Read the PR URL from the file generated by the script
          if [ ! -f promote_pr.url ]; then
            echo "❌ promote_pr.url file not found. Check make release-promote output."
            exit 1
          fi

          PR_URL=$(cat promote_pr.url)
          echo "Found PR: $PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

  # Restart release from this step if the job times out
  poll-merge:
    name: Poll PR Status
    needs: promote-images
    if: needs.promote-images.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: ${{ fromJSON(github.event.inputs.poll_timeout_mins || '360') > 360 && 360 || fromJSON(github.event.inputs.poll_timeout_mins || '360') }}

    steps:
      - name: Wait for PR Merge
        env:
          # Use a Fine-Grained PAT scoped to kubernetes/k8s.io with contents:write and pull_requests:write
          GH_TOKEN: ${{ secrets.K8S_IO_PAT }}
          PR_URL: ${{ needs.promote-images.outputs.pr_url }}
        run: |
          echo "Waiting for $PR_URL to be merged..."

          TIMEOUT_MINS="${{ github.event.inputs.poll_timeout_mins || '360' }}"
          if [ "$TIMEOUT_MINS" -gt 360 ]; then
            echo "⚠️ Provided timeout ($TIMEOUT_MINS mins) exceeds maximum GitHub limit. Capping to 360 minutes."
            TIMEOUT_MINS=360
          fi

          ATTEMPTS=$(( TIMEOUT_MINS / 5 ))
          echo "Polling every 5 minutes for up to $TIMEOUT_MINS minutes ($ATTEMPTS attempts)..."

          for ((i=1; i<=ATTEMPTS; i++)); do
            # Explicitly check the kubernetes/k8s.io repo context
            STATE=$(gh pr view "$PR_URL" --repo kubernetes/k8s.io --json state --jq '.state')
            
            echo "Attempt $i: PR is currently $STATE"
            
            if [ "$STATE" == "MERGED" ]; then
              echo "✅ PR merged. Proceeding."
              exit 0
            elif [ "$STATE" == "CLOSED" ]; then
              echo "❌ PR was closed without merging."
              exit 1
            fi
            
            sleep 300
          done

          echo "❌ Timed out waiting for merge after $TIMEOUT_MINS minutes."
          exit 1

  publish-draft:
    name: Publish Draft Release
    needs: [promote-images, poll-merge]
    if: needs.promote-images.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ needs.promote-images.outputs.new_tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6.2.0
        with:
          python-version: "3.10"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # TODO: Use workload identity instead
          # workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          # service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Generate Draft Release and Manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: "us-central1"
          GEMINI_MODEL: gemini-2.5-flash
        run: |
          pip install google-genai==1.30.0 pyopenssl==25.1.0

          # This finally publishes the draft for your review
          make release-publish TAG="${{ needs.promote-images.outputs.new_tag }}"
