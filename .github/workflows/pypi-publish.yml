name: Publish Python 🐍 distribution 📦 to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Run Unit Tests 🧪
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    defaults:
      run:
        working-directory: clients/python/agentic-sandbox-client

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with: 
        fetch-depth: 0  # Important: Fetches all history and tags for setuptools-scm
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Display Python version
      run: python -c "import sys; print(sys.version)"
        
    - name: Install dependencies (including tests)
      run: python3 -m pip install ".[test]" 

    - name: Run Unit Tests
      run: python3 -m pytest

  build:
    name: Build distribution 📦
    needs: test

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python/agentic-sandbox-client

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.10"

    - name: Install pypa/build
      run: >-
        python3 -m pip install build
        
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
      
    - name: Store the distribution packages
      uses: actions/upload-artifact@f4b39d853b5e86583854c73a636ab03958815f02 # v4
      with:
        name: python-package-distributions
        path: clients/python/agentic-sandbox-client/dist/

  publish-to-testpypi:
    name: >-
      Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: testpypi 
      url: https://test.pypi.org/p/k8s-agent-sandbox
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
      contents: read

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: python-package-distributions
        path: dist/
        
    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@9921f30b27e736d682d7e58e1625cc4e5cea36f1 # release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - publish-to-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/k8s-agent-sandbox
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
      contents: read

    # Run if it is a push event AND NOT a release candidate
    if: >-
      (github.event_name == 'push' && !contains(github.ref, 'rc'))

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: python-package-distributions
        path: dist/
        
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@9921f30b27e736d682d7e58e1625cc4e5cea36f1 # release/v1
